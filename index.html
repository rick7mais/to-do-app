<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Lista de Tarefas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>📝 Lista de Tarefas</h1>

        <!-- Campo de entrada (visual apenas) -->
        <div class="form">
            <input type="text" placeholder="Digite sua tarefa...">
            
            <select>
                <option value="baixa">Baixa (Verde)</option>
                <option value="media">Média (Amarelo)</option>
                <option value="alta">Alta (Vermelho)</option>
            </select>

            <button>Adicionar</button>
        </div>

        <!-- Lista de tarefas -->
        <ul class="lista">

            <li class="tarefa baixa">
                <input type="checkbox" id="t1">
                <label for="t1">Estudar HTML</label>
            </li>

            <li class="tarefa media">
                <input type="checkbox" id="t2">
                <label for="t2">Fazer exercícios de CSS</label>
            </li>

            <li class="tarefa alta">
                <input type="checkbox" id="t3">
                <label for="t3">Entregar projeto</label>
            </li>

        </ul>
    </div>

</body>
</html>
