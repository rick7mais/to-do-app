<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel de Tarefas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>📋 Painel de Tarefas</h1>

    <!-- FORM -->
    <form class="form">
        <input type="text" placeholder="Digite sua tarefa..." required id="tarefa">

        <select required id="prioridade">
            <option value="">Selecione prioridade</option>
            <option>Baixa (Verde)</option>
            <option>Média (Amarelo)</option>
            <option>Alta (Vermelho)</option>
        </select>

        <button type="submit">Adicionar</button>

        <p class="erro">❌ Ocorreu algum erro, tente novamente</p>
    </form>

    <div class="listas">

        <!-- BAIXA -->
        <h2 class="titulo baixa-text">🟢 Baixa Prioridade</h2>
        <ul>
            <li class="tarefa baixa"><input type="checkbox"><label>Organizar arquivos</label></li>
            <li class="tarefa baixa"><input type="checkbox"><label>Limpar mesa</label></li>
            <li class="tarefa baixa"><input type="checkbox"><label>Responder emails</label></li>
            <li class="tarefa baixa"><input type="checkbox"><label>Atualizar notas</label></li>
            <li class="tarefa baixa"><input type="checkbox"><label>Assistir aula</label></li>
            <li class="tarefa baixa"><input type="checkbox"><label>Revisar conteúdo</label></li>
            <li class="tarefa baixa"><input type="checkbox"><label>Separar documentos</label></li>
            <li class="tarefa baixa"><input type="checkbox"><label>Planejar semana</label></li>
            <li class="tarefa baixa"><input type="checkbox"><label>Ver notificações</label></li>
            <li class="tarefa baixa"><input type="checkbox"><label>Organizar pastas</label></li>
        </ul>

        <!-- MÉDIA -->
        <h2 class="titulo media-text">🟡 Média Prioridade</h2>
        <ul>
            <li class="tarefa media"><input type="checkbox"><label>Estudar CSS</label></li>
            <li class="tarefa media"><input type="checkbox"><label>Fazer exercícios</label></li>
            <li class="tarefa media"><input type="checkbox"><label>Criar layout</label></li>
            <li class="tarefa media"><input type="checkbox"><label>Ajustar responsividade</label></li>
            <li class="tarefa media"><input type="checkbox"><label>Testar site</label></li>
            <li class="tarefa media"><input type="checkbox"><label>Corrigir erros</label></li>
            <li class="tarefa media"><input type="checkbox"><label>Revisar código</label></li>
            <li class="tarefa media"><input type="checkbox"><label>Organizar projeto</label></li>
            <li class="tarefa media"><input type="checkbox"><label>Subir GitHub</label></li>
            <li class="tarefa media"><input type="checkbox"><label>Documentar</label></li>
        </ul>

        <!-- ALTA -->
        <h2 class="titulo alta-text">🔴 Alta Prioridade</h2>
        <ul>
            <li class="tarefa alta"><input type="checkbox"><label>Entregar projeto</label></li>
            <li class="tarefa alta"><input type="checkbox"><label>Finalizar site</label></li>
            <li class="tarefa alta"><input type="checkbox"><label>Enviar trabalho</label></li>
            <li class="tarefa alta"><input type="checkbox"><label>Corrigir bugs críticos</label></li>
            <li class="tarefa alta"><input type="checkbox"><label>Deploy no Vercel</label></li>
            <li class="tarefa alta"><input type="checkbox"><label>Apresentação</label></li>
            <li class="tarefa alta"><input type="checkbox"><label>Revisão final</label></li>
            <li class="tarefa alta"><input type="checkbox"><label>Corrigir layout</label></li>
            <li class="tarefa alta"><input type="checkbox"><label>Testar tudo</label></li>
            <li class="tarefa alta"><input type="checkbox"><label>Entrega final</label></li>
        </ul>

    </div>
</div>

</body>
</html>
